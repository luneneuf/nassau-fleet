<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나사우 함대 항로</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #0d1117; }
    #map { width: 100%; height: 100%; }

    .leaflet-popup-content-wrapper {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 0 !important;
      color: #e6edf3;
    }
    .leaflet-popup-tip { background: #161b22; }
    .leaflet-popup-content { margin: 12px 16px; }
    .popup-year {
      font-family: 'Cinzel', serif;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: #c9a227;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .popup-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: #e6edf3;
      margin-bottom: 4px;
    }
    .popup-desc {
      font-size: 0.78rem;
      color: #8b949e;
      line-height: 1.5;
    }
  </style>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="map"></div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', {
      center: [10, -30],
      zoom: 2,
      zoomControl: true,
      attributionControl: true
    });

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '© OpenStreetMap contributors © CARTO',
      maxZoom: 10
    }).addTo(map);

    // Nassau Fleet route waypoints
    const waypoints = [
      {
        latlng: [52.9, 4.8],
        year: '1623.04.29',
        name: '텍설 출항',
        desc: '11척 함대, 1,600명 병력 출항'
      },
      {
        latlng: [14.7, -17.4],
        year: '1623',
        name: '고레 (카보베르데)',
        desc: '대서양 중간 보급지'
      },
      {
        latlng: [-55.9, -67.6],
        year: '1624.02',
        name: '에르미트 제도 발견',
        desc: '케이프혼 인근 군도 탐사·해도 작성\n→ 오늘날 Hermite Islands'
      },
      {
        latlng: [-12.0, -77.1],
        year: '1624.05.08–08.14',
        name: '칼라오 봉쇄',
        desc: '98일 봉쇄. 은 수송선은 5일 전 출항.\n르 에르미트 제독, 6월 2일 이질로 사망.'
      },
      {
        latlng: [-2.2, -79.9],
        year: '1624.08.28',
        name: '과야킬 공격 실패',
        desc: '스페인 수비대에 격퇴, 25명 사상'
      },
      {
        latlng: [16.8, -99.9],
        year: '1624',
        name: '아카풀코',
        desc: '태평양 연안 추가 시도'
      },
      {
        latlng: [13.4, 144.7],
        year: '1625',
        name: '괌',
        desc: '귀환 항로 경유지'
      },
      {
        latlng: [0.5, 127.8],
        year: '1625',
        name: '몰루카스',
        desc: '향신료 제도 경유'
      },
      {
        latlng: [-6.2, 106.8],
        year: '1625',
        name: '바타비아 (자카르타)',
        desc: '원정 사실상 종료. 스하펜함 부제독 사망.'
      },
      {
        latlng: [52.9, 4.8],
        year: '1626',
        name: '귀환',
        desc: '생존자 일부 네덜란드 귀환'
      }
    ];

    // Route line
    const routeCoords = waypoints.map(w => w.latlng);

    // Split route at antimeridian visually with segments
    const segment1 = routeCoords.slice(0, 7);  // through Pacific eastward
    const segment2 = routeCoords.slice(6);      // Guam → Moluccas → Batavia → Netherlands

    L.polyline(routeCoords, {
      color: '#c9a227',
      weight: 1.5,
      opacity: 0.6,
      dashArray: '6, 6'
    }).addTo(map);

    // Custom marker icon
    function makeIcon(index) {
      return L.divIcon({
        className: '',
        html: `<div style="
          width: 10px; height: 10px;
          background: #c9a227;
          border: 1px solid #0d1117;
          border-radius: 50%;
          cursor: pointer;
        "></div>`,
        iconSize: [10, 10],
        iconAnchor: [5, 5]
      });
    }

    waypoints.forEach((wp, i) => {
      const marker = L.marker(wp.latlng, { icon: makeIcon(i) }).addTo(map);
      marker.bindPopup(`
        <div class="popup-year">${wp.year}</div>
        <div class="popup-name">${wp.name}</div>
        <div class="popup-desc">${wp.desc.replace(/\n/g, '<br/>')}</div>
      `);
    });
  </script>
</body>
</html>
